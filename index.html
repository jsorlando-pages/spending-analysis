    }
    .card-sm {
      background: #111827;

      padding: 16px;
    }
    .upload-zone {
      border: 2px dashed #334155;
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      background: #111827;
      position: relative;

    .upload-zone:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.06); }
    .upload-zone.loaded { border-style: solid; }
    .upload-zone.drag { border-color: #60a5fa; background: rgba(59, 130, 246, 0.1); }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    .progress-bar-wrap { background: #1e293b; border-radius: 999px; height: 8px; overflow: hidden; }
    .progress-bar { height: 100%; border-radius: 999px; transition: width 0.5s ease; }
    .tx-row { transition: background 0.15s; }
    .tx-row:hover { background: #1e293b; }
    .insight-card {
      background: linear-gradient(135deg, #111827 0%, #0f172a 100%);

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    @media (max-width: 1100px) { .grid-4 { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 768px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }
    .stat-card {
      background: #111827;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 20px 24px;
    }
    .section-title {
      font-size: 18px;

      color: #f1f5f9;

    }
    .text-xs { font-size: 12px; }

    .text-lg { font-size: 18px; }
    .text-xl { font-size: 20px; }

    .font-semibold { font-weight: 600; }
    .font-bold { font-weight: 700; }
    .text-muted { color: #64748b; }
    .text-secondary { color: #94a3b8; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .gap-4 { gap: 16px; }
    .mt-1 { margin-top: 4px; }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 12px; }
    .mt-4 { margin-top: 16px; }
    .mb-4 { margin-bottom: 16px; }
    .mb-6 { margin-bottom: 24px; }
    .rounded { border-radius: 8px; }
    .rounded-full { border-radius: 999px; }
    .w-full { width: 100%; }
    .overflow-x-auto { overflow-x: auto; }
    .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ─────────────────────────────────────────

    const CATEGORY_CONFIG = {

    const CARD_CONFIG = {
      'Amex':       { color: '#2563eb', label: 'American Express', short: 'Amex',   emoji: '🔵' },
      'Apple Card': { color: '#7c3aed', label: 'Apple Card',       short: 'Apple',  emoji: '🟣' },
      'Chase':      { color: '#0ea5e9', label: 'Chase',            short: 'Chase',  emoji: '🔷' },
    };

    const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    // MONTH_KEYS is derived dynamically from transaction data (see App component)

    // Card recommendations per category
    const CARD_RECS = {
      'Dining & Restaurants':   { card: 'Amex Gold',               rate: '4x MR points',         note: 'Best card for restaurant spend worldwide' },
      'Groceries':              { card: 'Amex Gold',               rate: '4x MR (up to $25k/yr)',note: 'Or Amex Blue Cash Preferred: 6% cash back (up to $6k/yr)' },
      'Shopping & Retail':      { card: 'Chase Sapphire Preferred', rate: '3x on online shopping',note: 'Or Citi Double Cash for flat 2% everywhere' },
      'Travel & Transport':     { card: 'Chase Sapphire Reserve',  rate: '3x travel points',     note: '$300 annual travel credit offsets most of the $550 fee' },
      'Health & Medical':       { card: 'Citi Double Cash',        rate: '2% everywhere',        note: 'No card offers a health-specific bonus; maximize flat rate' },
      'Pet Care':               { card: 'Citi Double Cash',        rate: '2% everywhere',        note: 'No specific pet bonus exists; Chase Amazon card for pet supplies online' },
      'Technology':             { card: 'Apple Card',              rate: '3% at Apple',          note: '2% back with Apple Pay anywhere else' },
      'Home & Garden':          { card: 'Citi Double Cash',        rate: '2% everywhere',        note: 'Chase Freedom Flex sometimes offers 5% on home improvement retailers' },
      'Beauty & Wellness':      { card: 'Citi Double Cash',        rate: '2% everywhere',        note: 'Chase Sapphire Reserve: spa counts as travel occasionally' },
      'Entertainment & Sports': { card: 'Amex Gold',              rate: '4x at dining venues',  note: 'Many venues qualify as restaurants; verify eligibility' },
      'Golf':                   { card: 'Citi Double Cash',        rate: '2% everywhere',        note: 'No card targets golf specifically; Amex Platinum includes Centurion/GOLFNOW perks at select clubs' },
      'Fitness':                { card: 'Chase Freedom Flex',      rate: '5% (rotating category)',note: 'Gyms/fitness clubs appear in Chase Freedom Flex rotating quarters; otherwise Citi Double Cash at 2%' },
      'Dry Cleaning':           { card: 'Citi Double Cash',        rate: '2% everywhere',        note: 'No card offers a dry cleaning bonus; maximize with a flat 2% card' },
      'Coffee':                 { card: 'Amex Gold',               rate: '4x at restaurants',    note: 'Most coffee shops (Starbucks, Blue Bottle, etc.) code as restaurants and earn 4x MR' },
      'Wine & Spirits':         { card: 'Amex Gold',               rate: '4x at restaurants',    note: 'Wine bars/shops often code as restaurants; liquor stores use Citi Double Cash at 2%' },
      'Insurance':              { card: 'Citi Double Cash',        rate: '2% everywhere',        note: 'No card rewards insurance payments; use a flat-rate 2% card to minimize opportunity cost' },
      'Charity & Donations':    { card: 'Amex Platinum',           rate: 'Amex charitable match', note: 'Amex Membership Rewards offers Give Back programs; some cards double matching on donations' },
      'Flowers & Gifts':        { card: 'Amex Gold',               rate: '4x at select florists', note: 'Many florists code as grocery/food; Amex Gold earns 4x. Chase Sapphire earns 3x on some gift purchases.' },
      'Auto Maintenance':       { card: 'Citi Double Cash',        rate: '2% everywhere',         note: 'No card targets auto maintenance; use a flat 2% card. Chase Freedom Flex occasionally includes auto dealers in 5% quarters.' },
      'Utilities':              { card: 'Chase Freedom Flex',      rate: '5% (rotating category)',note: 'Utilities are a recurring Chase Freedom Flex 5% quarter; otherwise Citi Double Cash at 2%' },
      'Subscriptions':          { card: 'Amex Blue Cash Preferred', rate: '6% on US streaming',  note: '$7.99/mo fee; breaks even with ~$133/yr streaming spend' },
      'Fees & Interest':        { card: 'N/A — Eliminate these!',  rate: '—',                   note: 'Pay balance in full monthly. Consider a 0% APR balance transfer card.' },
    };

    // ─────────────────────────────────────────
    //  CSV PARSING
    // ─────────────────────────────────────────

    function parseCSVRow(line) {
      const result = [];
      let field = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i+1] === '"') { field += '"'; i++; }
          else inQuotes = !inQuotes;
        } else if (ch === ',' && !inQuotes) {
          result.push(field.trim());
          field = '';
        } else {
          field += ch;
        }
      }
      result.push(field.trim());
      return result;
    }

    function decodeHTML(str) {
      return (str || '').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'");
    }

    function parseDate(dateStr) {
      if (!dateStr) return null;
      const parts = dateStr.split('/');
      if (parts.length !== 3) return null;
      const [m, d, y] = parts;
      if (!y || y.length !== 4) return null;
      return { year: y, month: String(m).padStart(2,'0'), day: String(d).padStart(2,'0'),
               monthKey: `${y}-${String(m).padStart(2,'0')}`,
               dateStr: `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}` };
    }

    function detectCard(headerLine) {
      const h = headerLine.toLowerCase();
      if (h.includes('card member') && h.includes('account #')) return 'amex';
      if (h.includes('clearing date') && h.includes('purchased by')) return 'apple';
      if (h.includes('post date') && h.includes('memo')) return 'chase';
      return null;
    }

    function parseAmex(text) {
      const lines = text.trim().split('\n');
      const txs = [];
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const cols = parseCSVRow(lines[i]);
        if (cols.length < 5) continue;
        const [dateRaw, description, cardMember, , amountStr] = cols;
        const amount = parseFloat(amountStr);
        if (isNaN(amount) || amount <= 0) continue; // negative = payment
        const desc = description.trim();
        if (/online payment|payment.*thank/i.test(desc)) continue;
        const dt = parseDate(dateRaw.trim());
        if (!dt) continue;
        const holder = /ashleigh/i.test(cardMember) ? 'Ashleigh' : 'Jonathan';
        txs.push({ id: `amex-${i}`, ...dt, description: desc, merchant: desc,
                   amount, card: 'Amex', cardHolder: holder, originalCategory: null });
      }
      return txs;
    }

    function parseApple(text) {
      const lines = text.trim().split('\n');
      const txs = [];
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const cols = parseCSVRow(lines[i]);
        if (cols.length < 7) continue;
        const [txDate, , description, merchant, category, type, amountStr, purchasedBy] = cols;
        if (type === 'Payment') continue;
        const amount = parseFloat(amountStr);
        if (isNaN(amount) || amount <= 0) continue;
        const dt = parseDate(txDate.trim());
        if (!dt) continue;
        const holder = /ashleigh/i.test(purchasedBy || '') ? 'Ashleigh' : 'Jonathan';
        txs.push({ id: `apple-${i}`, ...dt,
                   description: description.trim(), merchant: merchant.trim(),
                   amount, card: 'Apple Card', cardHolder: holder,
                   originalCategory: category.trim() });
      }
      return txs;
    }

    function parseChase(text) {
      const lines = text.trim().split('\n');
      const txs = [];
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const cols = parseCSVRow(lines[i]);
        if (cols.length < 6) continue;
        const [txDate, , description, category, type, amountStr] = cols;
        if (type === 'Payment') continue;
        const amount = parseFloat(amountStr);
        if (isNaN(amount) || amount >= 0) continue; // positive = credit/cashback
        const dt = parseDate(txDate.trim());
        if (!dt) continue;
        const desc = decodeHTML(description.trim());
        const cat  = decodeHTML(category.trim());
        txs.push({ id: `chase-${i}`, ...dt,
                   description: desc, merchant: desc,
                   amount: Math.abs(amount), card: 'Chase', cardHolder: 'Jonathan',
                   originalCategory: cat });
      }
      return txs;
    }

    function parseFile(text) {
      const firstLine = text.trim().split('\n')[0] || '';
      const ct = detectCard(firstLine);
      if (ct === 'amex')  return { card: 'Amex',       txs: parseAmex(text) };
      if (ct === 'apple') return { card: 'Apple Card', txs: parseApple(text) };
      if (ct === 'chase') return { card: 'Chase',      txs: parseChase(text) };
      return null;
    }

    // ─────────────────────────────────────────
    //  CATEGORIZATION
    // ─────────────────────────────────────────

    const RULES = [
      { cat: 'Fees & Interest',
        test: t => /interest charge|purchase interest|annual fee|late fee/i.test(t.description)
              || /fees & adjustments/i.test(t.originalCategory || '') },

      { cat: 'Insurance',
        test: t => {
          const d = t.description;
          return /\binsurance\b|\binsur\b/i.test(d)
            || /geico|allstate|state farm|progressive|travelers ins|nationwide ins/i.test(d)
            || /liberty mutual|farmers ins|usaa|amica|nationwide prop/i.test(d)
            || /new york life|met life|metlife|principal ins|guardian ins/i.test(d)
            || /health ins|dental ins|vision ins|life ins|auto ins|home ins|renters ins/i.test(d)
            || /\bcoverage\b.*premium|\bpremium\b.*\bcoverage\b/i.test(d);
        }},

      { cat: 'Pet Care',
        test: t => /nationwide pet|thefarmersdog|timetopet|animal hosp|petco|petsmart|olde towne animal/i.test(t.description) },

      { cat: 'Technology',
        test: t => /apple store|apple online store/i.test(t.description)
              || (/tesla/i.test(t.description) && /reservation/i.test(t.description))
              || (/best buy/i.test(t.description)) },

      { cat: 'Utilities',
        test: t => {
          const d = t.description; const oc = (t.originalCategory || '').toLowerCase();
          return oc === 'utilities'
            || /con edison|pseg|national grid|eversource/i.test(d)
            || /\bverizon\b|\bat&t\b|\bt-mobile\b/i.test(d)
            || /comcast|spectrum|optimum|xfinity/i.test(d)
            || /electric.*bill|gas.*bill|water.*bill|utility/i.test(d)
            || /water authority|gas company|electric company/i.test(d);
        }},

      { cat: 'Subscriptions',
        test: t => /siriusxm|sxm /i.test(t.description)
              || /apple\.com\/bill|apple\.com bill/i.test(t.description)
              || /apple services/i.test(t.merchant || t.description)
              || /passny rebill|rebill/i.test(t.description)
              || /netflix|spotify|hulu|disney\+|hbo max/i.test(t.description) },

      { cat: 'Travel & Transport',
        test: t => {
          const d = t.description; const oc = (t.originalCategory || '').toLowerCase();
          return oc === 'travel' || oc === 'transportation'
            || /\blyft\b|citi bike|mta\*|nyct paygo/i.test(d)
            || /\buber\b/i.test(d)
            || /curb svc.*taxi|taxi/i.test(d)
            || /tesla supercharger/i.test(d)
            || /core car|car service/i.test(d)
            || /cumberland farms/i.test(d)
            || /jetblue|delta|united air|american air|southwest air/i.test(d)
            || /hotel|marriott|hilton|hyatt/i.test(d)
            || /passny\b/i.test(d)
            || /parking garage|parking/i.test(d)
            || /fairmont|rosewood|barons cove resort/i.test(d);
        }},

      { cat: 'Health & Medical',
        test: t => {
          const d = t.description; const oc = (t.originalCategory || '').toLowerCase();
          return oc === 'medical' || oc === 'health & wellness'
            || /northwell|mskcc|sloan ket|sloan-kettering/i.test(d)
            || /vtg\*manhattan|propay\*manhattan/i.test(d)
            || /cvs\/pharmacy|duane reade/i.test(d)
            || /dermatology|dentist|dental|orthodont/i.test(d)
            || /plaza m spa|skin solutions/i.test(d);
        }},

      { cat: 'Golf',
        test: t => /\bgolf\b|bridge golf|golf de mayakoba|usgahandicap|thegrint|golfnow/i.test(t.description) },

      { cat: 'Fitness',
        test: t => {
          const d = t.description; const oc = (t.originalCategory || '').toLowerCase();
          return oc === 'fitness' || oc === 'sports & fitness'
            || /\bgym\b|\bfitness\b/i.test(d)
            || /equinox|soulcycle|soul cycle|orangetheory|orange theory/i.test(d)
            || /planet fitness|crunch fitness|lifetime fitness|life time/i.test(d)
            || /wodify|crossfit|barry.*boot|f45|solidcore/i.test(d)
            || /peloton|mirror fitness/i.test(d)
            || /ymca\b|ywca\b/i.test(d)
            || /pilates|yoga\b|barre\b|cycling studio/i.test(d)
            || /swim.*club|tennis.*club|athletic.*club/i.test(d);
        }},

      { cat: 'Entertainment & Sports',
        test: t => {
          const d = t.description; const oc = (t.originalCategory || '').toLowerCase();
          return oc === 'entertainment'
            || /southampton playhouse|playhouse|theater|theatre|concert/i.test(d)
            || /jazz club/i.test(d)
            || /dick.*sport|dick.*sporting/i.test(d);
        }},

      { cat: 'Dry Cleaning',
        test: t => {
          const d = t.description;

    function categorize(tx) {
      for (const rule of RULES) {
        if (rule.test(tx)) return rule.cat;

      return 'Other';

    // ─────────────────────────────────────────

    const fmt = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(n);
    const fmtD = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n);
    const fmtK = (n) => n >= 1000 ? `$${(n/1000).toFixed(1)}k` : fmt(n);

    function cleanMerchant(name) {
      return (name || '')
        .replace(/^(TST\*|SP |SQ \*|AplPay |FSP\*|DD \*|GLF\*|VTG\*)/i, '')
        .replace(/\s{2,}/g, ' ')
        .trim()
        .split(' ')
        .map((w,i) => i === 0 ? w.charAt(0).toUpperCase() + w.slice(1).toLowerCase() : w.toLowerCase())
        .join(' ')
        .substring(0, 38);
    }

    // Used only for grouping in top-merchant views — does NOT affect override/learned keys.
    function normalizeForGrouping(name) {
      let s = name || '';
      // Strip inline * transaction codes: "Alma*gt1f0n" → "Alma"
      s = s.replace(/\*[a-z0-9]{4,}/gi, '');
      // Strip # store references: " #1234", " #store"
      s = s.replace(/\s*#[a-z0-9]+/gi, '');
      // Strip trailing US city + state abbreviation (0–2 city words + 2-letter state)
      s = s.replace(/\s+(?:[a-z]+\s+){0,2}[a-z]{2}\s*$/, '');
      // Strip digit-prefixed tokens like "00bridgehampton", "0034abc"
      s = s.replace(/\s+\d+[a-z]\w*/gi, '');
      // Strip trailing 4+ digit store IDs
      s = s.replace(/\s+\d{4,}\s*$/, '');
      // Strip .com
      s = s.replace(/\.com\b/gi, '');
      // Strip trailing LLC / Inc / Corp / Co. / Ltd.
      s = s.replace(/\s+(llc|inc\.?|corp\.?|co\.|ltd\.?)$/i, '');
      s = s.replace(/\s{2,}/g, ' ').trim();
      if (!s) return name;
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    function DonutChart({ data, size = 220 }) {
      const ref = useRef();
      const chartInst = useRef();
      useEffect(() => {
        if (!ref.current || !data.length) return;
        if (chartInst.current) chartInst.current.destroy();
        const ctx = ref.current.getContext('2d');
        chartInst.current = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: data.map(d => d.category),
            datasets: [{
              data: data.map(d => d.total),
              backgroundColor: data.map(d => d._overflow ? '#475569' : (CATEGORY_CONFIG[d.category]?.color || '#94a3b8')),
              borderWidth: 2,
              borderColor: '#0a0f1e',
              hoverBorderColor: '#fff',
              hoverBorderWidth: 2,
            }]
          },
          options: {
            responsive: false,
            cutout: '68%',
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: '#1e293b',
                borderColor: '#334155',
                borderWidth: 1,
                titleColor: '#f1f5f9',
                bodyColor: '#94a3b8',
                padding: 12,
                callbacks: {
                  label: ctx => ` ${fmtD(ctx.raw)}  (${((ctx.raw / data.reduce((s,d)=>s+d.total,0))*100).toFixed(1)}%)`,
                }
              }
            },
            animation: { animateRotate: true, duration: 600 }
          }
        });
        return () => { if (chartInst.current) chartInst.current.destroy(); };
      }, [JSON.stringify(data)]);
      return <canvas ref={ref} width={size} height={size} style={{ display: 'block' }} />;
    }

    function OverviewTab({ transactions, categoryData, monthlyByCard, cardData, cardHolderData, monthKeys }) {
      const total = transactions.reduce((s,t) => s+t.amount, 0);
      const txCount = transactions.length;
      const topCat = categoryData[0];
      const peakMonth = useMemo(() => {
        const byM = {};
        transactions.forEach(t => { byM[t.monthKey] = (byM[t.monthKey]||0) + t.amount; });
        const sorted = Object.entries(byM).sort((a,b)=>b[1]-a[1]);
        if (!sorted.length) return null;
        const [key, val] = sorted[0];
        const idx = monthKeys.indexOf(key);
        return { label: MONTHS_SHORT[idx] || key, val };
      }, [transactions]);

      const donutData = useMemo(() => {
        const top10 = categoryData.slice(0, 10);
        const restItems = categoryData.slice(10);
        const rest = restItems.reduce((s,d)=>s+d.total, 0);
        if (rest > 0) return [...top10, { category: '+ ' + restItems.length + ' more categories', total: rest, _overflow: true }];
        return top10;
      }, [categoryData]);

      return (
        <div>
          {/* Stats row */}
          <div className="grid-4" style={{ marginBottom: 24 }}>
            <StatCard icon="💰" label="Total Spend" value={fmt(total)} sub={`${txCount} transactions`} color="#3b82f6" />
            <StatCard icon="📊" label="Monthly Avg" value={fmt(total/12)} sub="Across all cards" color="#8b5cf6" />
            <StatCard icon="🏆" label="Top Category" value={topCat?.category || '—'} sub={topCat ? fmt(topCat.total) : ''} color="#f59e0b" />
            <StatCard icon="📅" label="Peak Month" value={peakMonth?.label || '—'} sub={peakMonth ? fmt(peakMonth.val) : ''} color="#ef4444" />
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.6fr', gap: 20, marginBottom: 24, alignItems: 'start' }}>
            {/* Donut */}

              <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 20 }}>
                <div style={{ position: 'relative', display: 'inline-block' }}>

                      <div style={{ fontSize: 12, color: '#64748b', flexShrink: 0 }}>{pct}%</div>

    //  CATEGORIES TAB
    // ─────────────────────────────────────────

    function CategoryDrilldown({ category, transactions, total, onClose }) {
      const cfg = CATEGORY_CONFIG[category] || CATEGORY_CONFIG['Other'];
      const catTxs = transactions.filter(t => t.category === category);
      const catTotal = catTxs.reduce((s,t) => s+t.amount, 0);

      const topMerchants = useMemo(() => {
        const byM = {};
        catTxs.forEach(t => {
          const key = normalizeForGrouping(t._merchantKey);
          if (!byM[key]) byM[key] = { name: key, total: 0, count: 0 };
          byM[key].total += t.amount;
          byM[key].count++;
        });
        return Object.values(byM).sort((a,b) => b.total - a.total).slice(0, 10);
      }, [category, transactions]);

      return (
        <div style={{ position: 'fixed', inset: 0, zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24, background: 'rgba(0,0,0,0.7)' }}
          onClick={onClose}>
          <div style={{ background: '#111827', border: '1px solid #1e293b', borderRadius: 20, width: '100%', maxWidth: 560, maxHeight: '80vh', overflow: 'auto', boxShadow: '0 24px 64px rgba(0,0,0,0.6)' }}
            onClick={e => e.stopPropagation()}>

            {/* Header */}
            <div style={{ padding: '20px 24px 16px', borderBottom: '1px solid #1e293b', display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ fontSize: 28, background: cfg.bg, borderRadius: 12, width: 48, height: 48, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                {cfg.icon}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 800, fontSize: 18, color: '#f1f5f9' }}>{category}</div>
                <div style={{ color: '#64748b', fontSize: 13 }}>{catTxs.length} transactions · {fmtD(catTotal)} total</div>
              </div>
              <button onClick={onClose} style={{ background: '#1e293b', color: '#94a3b8', borderRadius: 8, padding: '6px 10px', fontSize: 18, lineHeight: 1 }}>×</button>
            </div>

            {/* Top merchants */}
            <div style={{ padding: '16px 24px 24px' }}>
              <div style={{ fontWeight: 700, fontSize: 14, color: '#64748b', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 14 }}>
                Top {topMerchants.length} Merchants
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {topMerchants.map((m, i) => {
                  const pct = (m.total / catTotal) * 100;
                  return (
                    <div key={m.name}>
                      <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 5 }}>
                        <span style={{ color: '#475569', fontSize: 12, fontWeight: 700, width: 18, flexShrink: 0 }}>#{i+1}</span>
                        <span style={{ flex: 1, color: '#e2e8f0', fontSize: 14, fontWeight: 600 }} className="truncate">{m.name}</span>
                        <span style={{ color: '#64748b', fontSize: 12, flexShrink: 0 }}>{m.count} tx</span>
                        <span style={{ fontWeight: 800, fontSize: 15, color: cfg.color, flexShrink: 0, width: 80, textAlign: 'right' }}>{fmt(m.total)}</span>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <div style={{ flex: 1, background: '#1e293b', borderRadius: 999, height: 6, overflow: 'hidden' }}>
                          <div style={{ height: '100%', borderRadius: 999, background: cfg.color, width: `${pct}%`, transition: 'width 0.4s ease' }} />
                        </div>
                        <span style={{ color: '#475569', fontSize: 12, width: 36, textAlign: 'right', flexShrink: 0 }}>{pct.toFixed(0)}%</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function CategoriesTab({ categoryData, transactions }) {
      const total = transactions.reduce((s,t) => s+t.amount, 0);
      const [drillCategory, setDrillCategory] = useState(null);

      return (
        <div>
          {drillCategory && (
            <CategoryDrilldown
              category={drillCategory}
              transactions={transactions}
              total={total}
              onClose={() => setDrillCategory(null)}
            />
          )}
          <div className="grid-2">
            {categoryData.map(({ category, total: catTotal }) => {
              const cfg = CATEGORY_CONFIG[category] || CATEGORY_CONFIG['Other'];
              const pct = ((catTotal/total)*100).toFixed(1);
              const catTxs = transactions.filter(t => t.category === category);
              const avgTx = catTxs.length ? catTxs.reduce((s,t)=>s+t.amount,0)/catTxs.length : 0;
              const rec = CARD_RECS[category];
              return (
                <div key={category} className="card" style={{ cursor: 'pointer' }}
                  onClick={() => setDrillCategory(category)}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>
                    <div style={{ fontSize: 28, background: cfg.bg, borderRadius: 12, width: 52, height: 52, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                      {cfg.icon}
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 700, fontSize: 16, color: '#f1f5f9' }}>{category}</div>
                      <div style={{ color: '#64748b', fontSize: 13 }}>{catTxs.length} transactions · avg {fmtD(avgTx)}</div>
                    </div>
                    <div style={{ textAlign: 'right', flexShrink: 0 }}>
                      <div style={{ fontWeight: 800, fontSize: 22, color: cfg.color }}>{fmt(catTotal)}</div>
                      <div style={{ color: '#64748b', fontSize: 13 }}>{pct}% of total</div>
                    </div>
                  </div>
                  <div className="progress-bar-wrap" style={{ marginBottom: 12 }}>
                    <div className="progress-bar" style={{ width: `${pct}%`, background: cfg.color }} />
                  </div>
                  {rec && (
                    <div style={{ background: '#0f172a', borderRadius: 8, padding: '10px 14px', fontSize: 13 }}>
                      <span style={{ color: '#22c55e', fontWeight: 600 }}>💡 Best card: </span>
                      <span style={{ color: '#e2e8f0', fontWeight: 600 }}>{rec.card}</span>
                      <span style={{ color: '#64748b' }}> · {rec.rate}</span>
                    </div>
                  )}
                  <div style={{ marginTop: 10, color: '#334155', fontSize: 12, textAlign: 'right' }}>
                    Top merchants →
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────
    //  TRENDS TAB
    // ─────────────────────────────────────────

    function CategoryHeatmap({ transactions, monthKeys }) {
      const [limit, setLimit] = useState(10);

      const rows = useMemo(() => {
        const byCat = {};
        transactions.forEach(t => {
          if (!byCat[t.category]) byCat[t.category] = {};
          byCat[t.category][t.monthKey] = (byCat[t.category][t.monthKey] || 0) + t.amount;
        });
        return Object.entries(byCat)
          .map(([category, byMonth]) => {
            const total = Object.values(byMonth).reduce((s, v) => s + v, 0);
            const peak  = Math.max(...Object.values(byMonth));
            return { category, byMonth, total, peak };
          })
          .sort((a, b) => b.total - a.total);
      }, [transactions]);

      const displayed = limit === 'all' ? rows : rows.slice(0, limit);

      return (
        <div className="card">
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 18, flexWrap: 'wrap', gap: 10 }}>
            <div>
              <div className="section-title" style={{ marginBottom: 2 }}>Spend by Category &amp; Month</div>
              <div style={{ color: '#64748b', fontSize: 13 }}>Cell shading shows each category's relative high — darker = peak month</div>
            </div>
            <select value={limit} onChange={e => setLimit(e.target.value === 'all' ? 'all' : Number(e.target.value))}>
              <option value={5}>Top 5 categories</option>
              <option value={10}>Top 10 categories</option>
              <option value="all">All categories</option>
            </select>
          </div>
          <div style={{ overflowX: 'auto' }}>
            <table style={{ fontSize: 12, width: '100%', borderCollapse: 'separate', borderSpacing: 3 }}>
              <thead>
                <tr>
                  <th style={{ textAlign: 'left', padding: '4px 10px', color: '#475569', fontWeight: 600, whiteSpace: 'nowrap', minWidth: 160 }}>Category</th>
                  {MONTHS_SHORT.map(mo => (
                    <th key={mo} style={{ padding: '4px 6px', color: '#475569', fontWeight: 600, textAlign: 'center', minWidth: 54 }}>{mo}</th>
                  ))}
                  <th style={{ padding: '4px 10px', color: '#475569', fontWeight: 600, textAlign: 'right', whiteSpace: 'nowrap' }}>Total</th>
                </tr>
              </thead>
              <tbody>
                {displayed.map(({ category, byMonth, total, peak }) => {
                  const cfg = CATEGORY_CONFIG[category] || CATEGORY_CONFIG['Other'];
                  return (
                    <tr key={category}>
                      <td style={{ padding: '4px 10px', whiteSpace: 'nowrap' }}>
                        <span style={{ fontWeight: 600, color: '#e2e8f0' }}>{cfg.icon} {category}</span>
                      </td>
                      {monthKeys.map(mk => {
                        const val = byMonth[mk] || 0;
                        const intensity = peak > 0 && val > 0 ? val / peak : 0;
                        const alpha = val > 0 ? Math.round(30 + intensity * 195).toString(16).padStart(2, '0') : '00';
                        const textColor = intensity > 0.55 ? '#f1f5f9' : intensity > 0 ? cfg.color : '#334155';
                        return (
                          <td key={mk} style={{
                            background: val > 0 ? cfg.color + alpha : '#0a0f1e',
                            border: `1px solid ${val > 0 ? cfg.color + '33' : '#0f172a'}`,
                            borderRadius: 5,
                            padding: '5px 4px',
                            textAlign: 'center',
                            fontWeight: val > 0 ? 600 : 400,
                            color: textColor,
                            transition: 'background 0.2s',
                          }}>
                            {val > 0 ? fmtK(val) : <span style={{ color: '#1e293b' }}>—</span>}
                          </td>
                        );
                      })}
                      <td style={{ padding: '4px 10px', fontWeight: 800, color: cfg.color, textAlign: 'right', whiteSpace: 'nowrap' }}>
                        {fmt(total)}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function TrendsTab({ transactions, monthlyByCard, topMerchants, monthKeys }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
          <div className="card">
            <div className="section-title">Monthly Spending Trend</div>
            <MonthlyBarChart monthlyByCard={monthlyByCard} monthKeys={monthKeys} />
            <div style={{ marginTop: 16, display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: 8 }}>
              {MONTHS_SHORT.map((mo, idx) => {
                const key = monthKeys[idx];
                const total = Object.values(monthlyByCard).reduce((s, byM) => s + (byM[key]||0), 0);
                return (
                  <div key={mo} style={{ textAlign: 'center', padding: '8px 4px', background: '#0f172a', borderRadius: 8 }}>
                    <div style={{ color: '#64748b', fontSize: 12, marginBottom: 2 }}>{mo}</div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: total > 0 ? '#e2e8f0' : '#334155' }}>
                      {total > 0 ? fmtK(total) : '—'}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          <CategoryHeatmap transactions={transactions} monthKeys={monthKeys} />
          <div className="card">
            <div className="section-title">Top Merchants by Spend</div>
            <HBarChart items={topMerchants} />
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────
    //  CATEGORY EDITOR CELL
    // ─────────────────────────────────────────

    function CategoryCell({ tx, overrides, onOverride }) {
      const [editing, setEditing] = useState(false);
      const mk = tx._merchantKey || cleanMerchant(tx.merchant || tx.description);
      const isLearned = overrides[mk] !== undefined;
      const cfg = CATEGORY_CONFIG[tx.category] || CATEGORY_CONFIG['Other'];
      const autoLabel = tx._autoCategory && tx._autoCategory !== tx.category
        ? `Learned rule · was: ${tx._autoCategory} · Click to change`
        : 'Click to reassign category';

      if (editing) {
        return (
          <select
            className="cat-select"
            autoFocus
            value={tx.category}
            onChange={e => { onOverride(tx, e.target.value); setEditing(false); }}
            onBlur={() => setEditing(false)}
          >
            {Object.keys(CATEGORY_CONFIG).sort().map(cat => {
              const c = CATEGORY_CONFIG[cat];
              return <option key={cat} value={cat}>{c.icon} {cat}</option>;
            })}
          </select>
        );
      }

      return (
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
          <span
            className="cat-badge"
            onClick={() => setEditing(true)}
            title={autoLabel}
            style={{
              background: cfg.bg,
              color: cfg.color,
              border: `1px solid ${isLearned ? cfg.color + '99' : 'transparent'}`,
            }}
          >
            {cfg.icon} {tx.category}{isLearned && ' 🧠'}
          </span>
          {isLearned && (
            <button
              onClick={e => { e.stopPropagation(); onOverride(tx, undefined); }}
              title={`Remove learned rule · revert to: ${tx._autoCategory || 'auto'}`}
              style={{ background: 'none', color: '#475569', fontSize: 13, lineHeight: 1, padding: '0 3px', borderRadius: 4, transition: 'color 0.15s' }}
              onMouseEnter={e => e.target.style.color='#ef4444'}
              onMouseLeave={e => e.target.style.color='#475569'}
            >✕</button>
          )}
        </div>
      );
    }

    // ─────────────────────────────────────────
    //  TRANSACTIONS TAB
    // ─────────────────────────────────────────

    function TransactionsTab({ transactions, overrides, onOverride, onResetAll }) {
      const [search, setSearch] = useState('');
      const [cardF, setCardF] = useState('all');
      const [catF, setCatF] = useState('all');
      const [sortBy, setSortBy] = useState({ col: 'date', dir: 'desc' });
      const toggleSort = (col) => setSortBy(prev =>
        prev.col === col ? { col, dir: prev.dir === 'desc' ? 'asc' : 'desc' } : { col, dir: col === 'amount' ? 'desc' : 'desc' }
      );
      const [modifiedOnly, setModifiedOnly] = useState(false);
      const [page, setPage] = useState(1);
      const PAGE_SIZE = 50;

      const overrideCount = Object.keys(overrides).length;

      const filtered = useMemo(() => {
        let txs = transactions.filter(t => {
          if (cardF !== 'all' && t.card !== cardF) return false;
          if (catF !== 'all' && t.category !== catF) return false;
          if (modifiedOnly && overrides[t._merchantKey] === undefined) return false;
          if (search) {
            const q = search.toLowerCase();
            if (!t.description.toLowerCase().includes(q) && !(t.merchant||'').toLowerCase().includes(q)) return false;
          }
          return true;
        });
        if (sortBy.col === 'amount') txs = [...txs].sort((a,b) => sortBy.dir === 'desc' ? b.amount - a.amount : a.amount - b.amount);
        else txs = [...txs].sort((a,b) => sortBy.dir === 'desc' ? b.dateStr.localeCompare(a.dateStr) : a.dateStr.localeCompare(b.dateStr));
        return txs;
      }, [transactions, search, cardF, catF, sortBy, modifiedOnly, overrides]);

      const pages = Math.ceil(filtered.length / PAGE_SIZE);
      const pageTxs = filtered.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);
      const pageTotal = filtered.reduce((s,t)=>s+t.amount,0);

      useEffect(() => { setPage(1); }, [search, cardF, catF, sortBy.col, sortBy.dir, modifiedOnly]);

      const cards = [...new Set(transactions.map(t=>t.card))];
      const cats  = [...new Set(transactions.map(t=>t.category))].sort();

      return (
        <div className="card">
          {/* Filters */}
          <div style={{ display: 'flex', gap: 10, marginBottom: 12, flexWrap: 'wrap', alignItems: 'center' }}>
            <input type="search" placeholder="Search transactions…" value={search} onChange={e=>setSearch(e.target.value)} style={{ flex: 1, minWidth: 200 }} />
            <select value={cardF} onChange={e=>setCardF(e.target.value)}>
              <option value="all">All Cards</option>
              {cards.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
            <select value={catF} onChange={e=>setCatF(e.target.value)}>
              <option value="all">All Categories</option>
              {cats.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>

          {/* Status + override controls */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14, flexWrap: 'wrap' }}>
            <span style={{ color: '#64748b', fontSize: 13 }}>
              {filtered.length} transactions · {fmt(pageTotal)}
              {pages > 1 && ` · Page ${page} of ${pages}`}
            </span>
            <div style={{ flex: 1 }} />
            {overrideCount > 0 && (
              <>
                <button
                  onClick={() => setModifiedOnly(v => !v)}
                  style={{
                    background: modifiedOnly ? '#1e3a8a' : '#1e293b',
                    color: modifiedOnly ? '#93c5fd' : '#94a3b8',
                    padding: '5px 12px', borderRadius: 8, fontSize: 12, fontWeight: 600,
                    border: `1px solid ${modifiedOnly ? '#3b82f6' : '#334155'}`,
                  }}>
                  🧠 {overrideCount} merchant{overrideCount !== 1 ? 's' : ''} learned{modifiedOnly ? ' (showing)' : ''}
                </button>
                <button
                  onClick={() => { if (window.confirm(`Clear all ${overrideCount} learned merchant rules?`)) onResetAll(); }}
                  style={{ background: '#1e293b', color: '#f87171', padding: '5px 12px', borderRadius: 8, fontSize: 12, fontWeight: 600, border: '1px solid #334155' }}>
                  Reset all
                </button>
              </>
            )}
          </div>

          {/* Hint */}
          <div style={{ background: '#0f172a', border: '1px solid #1e293b', borderRadius: 8, padding: '8px 14px', marginBottom: 14, fontSize: 12, color: '#475569', display: 'flex', alignItems: 'center', gap: 8 }}>
            <span>✏️</span>
            <span>Click any <strong style={{ color: '#64748b' }}>category badge</strong> to reassign it. The app <strong style={{ color: '#64748b' }}>learns the rule for that merchant</strong> — every transaction from that merchant updates instantly and the rule persists across sessions. Learned transactions show <strong style={{ color: '#64748b' }}>🧠</strong>.</span>
          </div>

          <div className="overflow-x-auto">
            <table style={{ fontSize: 13 }}>
              <thead>
                <tr style={{ borderBottom: '1px solid #1e293b' }}>
                  {['Date','Description','Card','Category','Amount','Holder'].map(h => {
                    const sortable = h === 'Date' || h === 'Amount';
                    const col = h.toLowerCase();
                    const active = sortBy.col === col;
                    const arrow = active ? (sortBy.dir === 'desc' ? ' ▼' : ' ▲') : ' ⇅';
                    return (
                      <th key={h}
                        onClick={sortable ? () => toggleSort(col) : undefined}
                        style={{
                          padding: '10px 12px', fontWeight: 600, whiteSpace: 'nowrap',
                          color: active ? '#93c5fd' : '#64748b',
                          cursor: sortable ? 'pointer' : 'default',
                          userSelect: 'none',
                        }}>
                        {h}{sortable && <span style={{ fontSize: 11, opacity: active ? 1 : 0.4 }}>{arrow}</span>}
                      </th>
                    );
                  })}
                </tr>
              </thead>
              <tbody>
                {pageTxs.map(t => {
                  const cardCfg = CARD_CONFIG[t.card] || {};
                  return (
                    <tr key={t.id} className="tx-row" style={{ borderBottom: '1px solid #0f172a' }}>
                      <td style={{ padding: '10px 12px', color: '#64748b', whiteSpace: 'nowrap' }}>{t.dateStr}</td>
                      <td style={{ padding: '10px 12px', color: '#e2e8f0', maxWidth: 300 }} className="truncate" title={t.description}>{t.description}</td>
                      <td style={{ padding: '10px 12px', whiteSpace: 'nowrap' }}>

        { id: 'categories',    label: '🏷️ Categories' },
        { id: 'trends',        label: '📈 Trends' },
        { id: 'transactions',  label: overrideCount > 0 ? `🧾 Transactions · 🧠 ${overrideCount} learned` : '🧾 Transactions' },
        { id: 'insights',      label: '💡 Insights' },
        { id: 'tax',           label: '🧾 Tax' },
      ];

      const totalSpend = transactions.reduce((s,t) => s+t.amount, 0);

      return (
        <div className="fade-in">
          {/* Header */}
          <div style={{ background: 'linear-gradient(180deg, #111827 0%, #0a0f1e 100%)', borderBottom: '1px solid #1e293b', padding: '20px 32px', position: 'sticky', top: 0, zIndex: 50 }}>
            <div style={{ maxWidth: 1280, margin: '0 auto', display: 'flex', alignItems: 'center', gap: 20, flexWrap: 'wrap' }}>
              <div style={{ flex: 1, minWidth: 200 }}>
                <div style={{ fontWeight: 900, fontSize: 22, background: 'linear-gradient(90deg,#3b82f6,#8b5cf6)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>
                  💳 Spending Analysis
                </div>
                <div style={{ color: '#64748b', fontSize: 13, marginTop: 2 }}>
                  {dataYear} · {loadedCount} card{loadedCount > 1 ? 's' : ''} · {transactions.length.toLocaleString()} transactions · {fmt(totalSpend)} total
                </div>
              </div>
              {/* Loaded badges */}
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
                {[['Amex','amex','#2563eb'],['Apple','apple','#7c3aed'],['Chase','chase','#0ea5e9']].map(([label, key, color]) => (
                  rawFiles[key] ? (
                    <span key={key} style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: '5px 12px', borderRadius: 999,
                      background: color+'22', border: `1px solid ${color}55`, color, fontSize: 13, fontWeight: 600 }}>
                      ✓ {label}
                      <button onClick={() => handleRemoveLoaded(key)} title={`Remove ${label}`}
                        style={{ background: 'none', color: color+'99', fontSize: 14, lineHeight: 1, padding: '0 0 0 2px', borderRadius: 4, transition: 'color 0.15s' }}
                        onMouseEnter={e => e.target.style.color='#ef4444'}
                        onMouseLeave={e => e.target.style.color=color+'99'}>×</button>
                    </span>
                  ) : null
                ))}
                <label title="Add a CSV" style={{ cursor: 'pointer' }}>
                  <input type="file" accept=".csv" multiple onChange={e => { handleFiles(Array.from(e.target.files)); e.target.value=''; }} />
                  <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: '5px 12px', borderRadius: 999,
                    background: '#1e293b', border: '1px solid #334155', color: '#64748b', fontSize: 13, fontWeight: 600, transition: 'all 0.2s' }}>
                    + Add CSV
                  </span>
                </label>
              </div>
            </div>
            {/* Tabs */}
            <div style={{ maxWidth: 1280, margin: '12px auto 0', display: 'flex', gap: 4, overflowX: 'auto', paddingBottom: 2 }}>
              {tabs.map(t => (
                <button key={t.id} className={`tab-btn${activeTab === t.id ? ' active' : ''}`} onClick={() => setActiveTab(t.id)}>
                  {t.label}
                </button>
              ))}
            </div>
          </div>

          {/* Content */}
          <div style={{ maxWidth: 1280, margin: '0 auto', padding: '28px 24px' }} className="fade-in" key={activeTab}>
            {activeTab === 'overview'     && <OverviewTab transactions={effectiveTxs} categoryData={categoryData} monthlyByCard={monthlyByCard} cardData={cardData} cardHolderData={cardHolderData} monthKeys={monthKeys} />}
            {activeTab === 'categories'   && <CategoriesTab categoryData={categoryData} transactions={effectiveTxs} />}
            {activeTab === 'trends'       && <TrendsTab transactions={effectiveTxs} monthlyByCard={monthlyByCard} topMerchants={topMerchants} monthKeys={monthKeys} />}
            {activeTab === 'transactions' && <TransactionsTab transactions={effectiveTxs} overrides={overrides} onOverride={handleOverride} onResetAll={handleResetAll} />}
            {activeTab === 'insights'     && <InsightsTab transactions={effectiveTxs} categoryData={categoryData} topMerchants={topMerchants} />}
            {activeTab === 'tax'          && <TaxTab transactions={effectiveTxs} dataYear={dataYear} />}
          </div>

          {/* Toast notification */}
          {toast && (
            <div style={{
              position: 'fixed', bottom: 28, right: 28, zIndex: 9999,
              background: '#1e293b', border: '1px solid #334155', borderRadius: 12,
              padding: '13px 20px', color: '#e2e8f0', fontSize: 14, fontWeight: 500,
              boxShadow: '0 8px 32px rgba(0,0,0,0.5)',
              display: 'flex', alignItems: 'center', gap: 10, maxWidth: 400,
              animation: 'fadeIn 0.2s ease',
            }}>
              <span style={{ flex: 1 }}>{toast}</span>
              <button onClick={() => setToast(null)}
                style={{ background: 'none', color: '#475569', fontSize: 16, lineHeight: 1, padding: '0 2px', borderRadius: 4 }}>×</button>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
